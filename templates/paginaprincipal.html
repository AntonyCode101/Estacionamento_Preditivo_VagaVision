<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <title>Mapa com Busca</title>
</head>
<body>
    <form id="formBusca">
        <input type="search" id="search" placeholder="Buscar local..." required>
        <button type="submit">Buscar</button>
    </form>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        var map = L.map('map').setView([-22.2139, -49.9458], 14);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);
        var marcadorBusca;
        document.getElementById("formBusca").addEventListener("submit", function(e){
            e.preventDefault();

            var query = document.getElementById("search").value;

            if (!query) return;

            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(data => {

                    console.log(data);

                    if (!data || data.length === 0) {
                        alert("Local não encontrado");
                        return;
                    }

                    var lat = parseFloat(data[0].lat);
                    var lon = parseFloat(data[0].lon);
                    if (marcadorBusca) {
                        map.removeLayer(marcadorBusca);
                    }
                    marcadorBusca = L.marker([lat, lon]).addTo(map)
                        .bindPopup(data[0].display_name)
                        .openPopup();
                    map.setView([lat, lon], 16);
                })
                .catch(err => {
                    console.error(err);
                    alert("Erro ao buscar localização");
                });
        });
    </script>
</body>
</html>
